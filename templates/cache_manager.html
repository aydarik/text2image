<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Cache Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --accent: #38bdf8;
            --danger: #ef4444;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--accent);
        }

        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        select,
        button {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        button {
            background: var(--danger);
            font-weight: 600;
            border: none;
        }

        button:hover {
            filter: brightness(1.2);
            transform: translateY(-1px);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 0.75rem;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(8px);
        }

        .card:hover {
            transform: scale(1.05);
            border-color: var(--accent);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 1px solid var(--glass-border);
        }

        .card-info {
            padding: 0.75rem;
            font-size: 0.75rem;
            color: #94a3b8;
        }

        .pagination {
            margin-top: 3rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        .pagination a {
            text-decoration: none;
            color: var(--text);
            padding: 0.5rem 1.5rem;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 0.5rem;
            transition: all 0.2s;
        }

        .pagination a:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
        }

        .empty {
            text-align: center;
            color: #64748b;
            padding: 4rem;
        }
    </style>
</head>

<body>
<div class="container">
    <header>
        <h1>Image Cache</h1>
        <div class="controls">
            <form action="/cache/clear" method="post" style="display: flex; gap: 0.5rem;">
                <button type="submit">Clear Cache</button>
            </form>
        </div>
    </header>

    {% if not images %}
    <div class="empty">No images found in cache.</div>
    {% else %}
    <div class="grid">
        {% for img in images %}
        <div class="card">
            <img src="/images_static/{{ img.name }}" alt="{{ img.name }}" loading="lazy">
            <div class="card-info">
                <div>{{ img.name[:16] }}...</div>
                <div style="margin-top: 4px;">{{ img.date }}</div>
            </div>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <div class="pagination">
        {% if page > 1 %}
        <a href="/cache?page={{ page - 1 }}">Previous</a>
        {% endif %}
        {% if has_more %}
        <a href="/cache?page={{ page + 1 }}">Next</a>
        {% endif %}
    </div>
</div>
</body>

</html>
