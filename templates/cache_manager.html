<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Cache Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --accent: #38bdf8;
            --danger: #ef4444;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--accent);
        }

        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        select,
        button {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        button {
            background: var(--danger);
            font-weight: 600;
            border: none;
        }

        button:hover {
            filter: brightness(1.2);
            transform: translateY(-1px);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 0.75rem;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(8px);
        }

        .card:hover {
            transform: scale(1.05);
            border-color: var(--accent);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 1px solid var(--glass-border);
        }

        .card-info {
            padding: 0.75rem;
            font-size: 0.75rem;
            color: #94a3b8;
        }

        .pagination {
            margin-top: 3rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        .pagination a {
            text-decoration: none;
            color: var(--text);
            padding: 0.5rem 1.5rem;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 0.5rem;
            transition: all 0.2s;
        }

        .pagination a:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
        }

        .empty {
            text-align: center;
            color: #64748b;
            padding: 4rem;
        }
    </style>
</head>

<body>
<div class="container">
    <header>
        <h1>Image Cache</h1>
        <div class="controls">
            <form action="/cache" method="get" style="display: flex; gap: 0.5rem;" id="filter-form">
                <select name="ip" onchange="document.getElementById('filter-form').submit()">
                    <option value="all" {% if current_ip=='all' %}selected{% endif %}>All</option>
                    {% for ip_opt in all_ips %}
                    <option value="{{ ip_opt }}" {% if current_ip==ip_opt %}selected{% endif %}>{{ ip_opt }}</option>
                    {% endfor %}
                </select>
            </form>
            <form action="/cache/clear" method="post" style="display: flex; gap: 0.5rem;">
                <input type="hidden" name="ip" value="{{ current_ip }}">
                <button type="submit" onclick="return confirm('Clear cache for {{ current_ip }}?')">Clear
                    Cache
                </button>
            </form>
        </div>
    </header>

    <div class="grid" id="image-grid">
        <div id="load-more-trigger" data-page="1" data-has-more="true" style="height: 10px; width: 100%;"></div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const grid = document.getElementById('image-grid');
        if (!grid) return;

        let loading = false;
        const currentIp = "{{ current_ip }}";

        const observerOptions = {
            root: null,
            rootMargin: '200px',
            threshold: 0.1
        };

        const handleIntersect = (entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting && !loading) {
                    const trigger = entry.target;
                    const page = trigger.getAttribute('data-page');
                    const hasMore = trigger.getAttribute('data-has-more') === 'true';

                    if (hasMore) {
                        loadMore(page, trigger, observer);
                    }
                }
            });
        };

        const observer = new IntersectionObserver(handleIntersect, observerOptions);

        const initObserver = () => {
            const trigger = document.getElementById('load-more-trigger');
            if (trigger) {
                observer.observe(trigger);
            }
        };

        initObserver();

        async function loadMore(page, trigger, observer) {
            loading = true;
            // Remove old trigger while loading
            trigger.remove();

            try {
                const response = await fetch(`/cache?page=${page}&ip=${currentIp}&ajax=true`);
                if (!response.ok) throw new Error('Network response was not ok');

                const html = await response.text();

                if (page === "1" && html.trim() === "") {
                    grid.innerHTML = '<div class="empty">No images found in cache.</div>';
                    return;
                }

                // Append new content
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = html;

                const fragment = document.createDocumentFragment();
                while (tempDiv.firstChild) {
                    fragment.appendChild(tempDiv.firstChild);
                }

                grid.appendChild(fragment);

                // Observe new trigger if it exists
                initObserver();
            } catch (error) {
                console.error('Error loading more images:', error);
            } finally {
                loading = false;
            }
        }
    });
</script>
</body>

</html>
